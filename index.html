<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby | Apple-Core Hub 🍏</title>
    <style>
        /* Fuentes divertidas y escritas a mano */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Gaegu:wght@400;700&family=Patrick+Hand&display=swap');

        :root {
            --apple-red: #ff6b6b;
            --apple-green: #9edb64;
            --soft-yellow: #fff9c4;
            --leaf-green: #5ca445;
            --bg-check: #e1f2d5;
            --paper-white: #ffffff;
        }

        body {
            /* Fondo de cuadritos tipo picnic como en la imagen */
            background-color: var(--apple-green);
            background-image: 
                linear-gradient(45deg, var(--bg-check) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--bg-check) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--bg-check) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--bg-check) 75%);
            background-size: 40px 40px;
            font-family: 'Patrick Hand', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- MENÚ TIPO NUBE / BOTONES REDONDEADOS --- */
        .main-nav {
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.9);
            margin: 20px 0;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            border: 4px solid var(--paper-white);
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            position: sticky;
            top: 10px;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: var(--leaf-green);
            font-family: 'Fredoka', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 15px;
            border-radius: 30px;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            background: var(--soft-yellow);
            color: var(--apple-red);
            transform: scale(1.1);
        }

        /* --- CONTENEDOR TIPO HOJA DE PAPEL --- */
        .main-card {
            width: 90%;
            max-width: 800px;
            background: var(--paper-white);
            border-radius: 40px;
            padding: 40px;
            border: 8px solid var(--apple-green);
            position: relative;
            box-shadow: 15px 15px 0 rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }

        /* --- 4 IMÁGENES TIPO STICKERS --- */
        .sticker-img {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            object-fit: cover;
            z-index: 5;
            transition: 0.3s;
        }
        .sticker-img:hover { transform: scale(1.1) rotate(0deg) !important; z-index: 10; }

        #img1 { top: -40px; left: -40px; transform: rotate(-10deg); border-color: var(--apple-red); }
        #img2 { top: -40px; right: -40px; transform: rotate(10deg); border-color: var(--soft-yellow); }
        #img3 { bottom: -30px; left: -20px; transform: rotate(5deg); border-color: var(--leaf-green); }
        #img4 { bottom: -30px; right: -20px; transform: rotate(-5deg); border-color: var(--apple-red); }

        /* --- CONTENIDO --- */
        .header-title {
            text-align: center;
            background: var(--apple-green);
            color: white;
            padding: 20px;
            border-radius: 25px;
            font-family: 'Fredoka', sans-serif;
            margin-bottom: 30px;
        }

        .banner-gif {
            width: 100%;
            border-radius: 20px;
            border: 3px dashed var(--apple-red);
            margin-bottom: 20px;
        }

        .highlight {
            background: var(--soft-yellow);
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        .welcome-text {
            font-size: 22px;
            color: #444;
            line-height: 1.5;
            text-align: center;
        }

        .btn-start {
            display: block;
            width: fit-content;
            margin: 20px auto;
            background: var(--apple-red);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Fredoka', sans-serif;
            font-size: 20px;
            box-shadow: 0 5px 0 #c0392b;
        }

        .btn-start:active { transform: translateY(5px); box-shadow: 0 0 0; }

        footer {
            margin-top: 20px;
            color: var(--paper-white);
            font-family: 'Patrick Hand';
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

    </style>
</head>
<body onclick="playMusic()">

    <audio id="bgMusic" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <header class="main-nav">
        <nav>
            <a href="index.html" class="active">HOME</a>
            <a href="admin.html">ADMIN II</a>
            <a href="historia.html">CONCIENCIA</a>
            <a href="comu.html">COMUNICACIÓN</a>
            <a href="psico.html">PSICOLOGÍA</a>
            <a href="aut.html">AUTORES</a>
            <a href="user.html">EDITORES</a> </nav>
    </header>

    <div class="main-card">
        <img src="lobby1.png" id="img1" class="sticker-img" alt="Sticker 1">
        <img src="lobby2.png" id="img2" class="sticker-img" alt="Sticker 2">
        <img src="lobby3.png" id="img3" class="sticker-img" alt="Sticker 3">
        <img src="lobby4.png" id="img4" class="sticker-img" alt="Sticker 4">

        <div class="header-title">
            <h1 style="margin:0;">🍎 COBAT 22  🍎</h1>
        </div>

        <img src="banner.gif" class="banner-gif" alt="Welcome GIF">

        <div class="welcome-text">
            <p>¡Hola! Estás en el rincón <span class="highlight">de alumnos cobat</span> de nuestra escuela.</p>
            <p>Aquí recolectamos que emos trabajado en cada materia</p>
            
            <a href="admin.html" class="btn-start">¡Entrar ahora! ✨</a>
        </div>
    </div>

    <footer>Hecho con mucho cariño para el COBAT 22 • 2026</footer>

    <script>
        function playMusic() {
            var audio = document.getElementById("bgMusic");
            if (audio.paused) { audio.play(); }
        }
    </script>
</body>
</html>
